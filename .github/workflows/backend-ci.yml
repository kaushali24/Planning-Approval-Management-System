name: Backend CI

on:
  push:
    paths:
      - civitrack-backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - civitrack-backend/**
      - .github/workflows/backend-ci.yml

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: civitrack_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d civitrack_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/civitrack_ci
      DB_BOOTSTRAP_SCHEMA: "true"
      JWT_SECRET: ci-test-secret
      EMAIL_USER: ci@example.com
      EMAIL_PASSWORD: ci-password
    defaults:
      run:
        working-directory: civitrack-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: civitrack-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Verify migrations are idempotent
        run: npm run db:migrate

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Enforce coverage thresholds
        run: npm run test:ci
