name: Backend CI

on:
  push:
    paths:
      - civitrack-backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - civitrack-backend/**
      - .github/workflows/backend-ci.yml

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: civitrack-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: civitrack-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Enforce coverage thresholds
        run: npm run test:ci
