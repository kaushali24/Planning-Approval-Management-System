name: Frontend CI

on:
  push:
    paths:
      - civitrack-react/**
      - .github/workflows/frontend-ci.yml
  pull_request:
    paths:
      - civitrack-react/**
      - .github/workflows/frontend-ci.yml

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: civitrack-react

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: civitrack-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
