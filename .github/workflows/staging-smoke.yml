name: Staging Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: civitrack_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d civitrack_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/civitrack_smoke
      JWT_SECRET: smoke-secret
      EMAIL_USER: smoke@example.com
      EMAIL_PASSWORD: smoke-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: civitrack-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: civitrack-backend
        run: npm ci

      - name: Run DB migrations
        working-directory: civitrack-backend
        run: npm run db:migrate

      - name: Start backend server
        working-directory: civitrack-backend
        run: |
          npm run start &
          sleep 8

      - name: Smoke check health endpoint
        run: curl --fail --silent http://localhost:5000/api/health

  smoke-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: civitrack-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: civitrack-react
        run: npm ci

      - name: Build frontend
        working-directory: civitrack-react
        run: npm run build
